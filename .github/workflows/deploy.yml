# ============================================================
#  RareFolio Marketplace — Deploy to server on push to main
# ============================================================
#
#  Server: same BlueHost VPS as rarefolio.io (50.6.202.60)
#
#  Required GitHub repository secrets (Settings → Secrets → Actions):
#
#    Shared with rarefolio.io — copy values from that repo:
#      SFTP_HOST             — rarefolio.io
#      SFTP_USER             — BlueHost SSH / cPanel username
#      SFTP_KEY              — base64-encoded ed25519 private key
#      SFTP_PORT             — 22
#
#    Market-specific — set once:
#      MARKET_REMOTE_DIR     — absolute path to the marketplace web root
#                              e.g. /home/<user>/public_html/market.rarefolio.io
#      DEPLOY_WEBHOOK_SECRET — 64-char hex secret matching .env DEPLOY_WEBHOOK_SECRET
#                              Generate: php scripts/gen-webhook-secret.php
#
#  NOTE: BlueHost disables SSH shell access for SFTP-only accounts.
#  File sync uses the SFTP subsystem (no shell needed).
#  DB migrations are triggered via an HTTP endpoint (admin/run-migrations.php)
#  protected by DEPLOY_WEBHOOK_SECRET.
#  Sidecar rebuild/restart must be done manually until shell access is enabled.
#
#  What this workflow does:
#    1. Sync PHP application files via lftp SFTP mirror
#    2. Trigger DB migrations via HTTPS (admin/run-migrations.php)
#    3. Verify marketplace health via public API
#
#  Trigger manually:
#    GitHub → Actions → Deploy marketplace → Run workflow
# ============================================================

name: Deploy marketplace

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: sync + migrate + sidecar → server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- SSH key (same format as rarefolio.io deploy) --------------------
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          # Decode base64-encoded key — avoids CRLF/echo corruption
          echo "${{ secrets.SFTP_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      # ---- 1. Sync PHP application files via lftp SFTP --------------------
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Sync files via lftp SFTP
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            set sftp:connect-program 'ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.SFTP_PORT }} -q'
            set net:timeout 60
            set net:max-retries 3
            open -u \"${{ secrets.SFTP_USER }},\" sftp://${{ secrets.SFTP_HOST }}
            mirror --reverse --verbose --only-newer \
              --exclude-glob .git/ \
              --exclude-glob .gitignore \
              --exclude-glob .gitattributes \
              --exclude-glob README.md \
              --exclude-glob docs/ \
              --exclude-glob scripts/ \
              --exclude-glob dist/ \
              --exclude-glob tests/ \
              --exclude-glob verify.php \
              --exclude-glob .env \
              --exclude-glob .env.old \
              --exclude-glob .env.production \
              --exclude-glob sidecar/.env \
              --exclude-glob sidecar/.env.old \
              --exclude-glob sidecar/.env.production \
              --exclude-glob 'sidecar/node_modules/' \
              --exclude-glob 'sidecar/dist/' \
              --exclude-glob '*.log' \
              ./ ${{ secrets.MARKET_REMOTE_DIR }}/
            bye
          "

      # ---- 2. DB migrations via HTTP (no shell required) --------------------
      #  Calls admin/run-migrations.php over HTTPS, authenticated by
      #  DEPLOY_WEBHOOK_SECRET. Safe to skip if secret not yet configured.
      - name: Run DB migrations
        if: ${{ secrets.DEPLOY_WEBHOOK_SECRET != '' }}
        run: |
          RESPONSE=$(curl -fsS \
            -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            "https://market.rarefolio.io/admin/run-migrations.php" 2>&1) || true
          echo "Migration response: $RESPONSE"

      # ---- 3. Health check via public API ----------------------------------
      - name: Health check
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" \
              "https://market.rarefolio.io/api/v1/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API healthy (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying..."
            sleep 3
          done
          echo "Health check failed after 10 attempts"
          exit 1

      # ---- NOTE: Sidecar rebuild/restart ----------------------------------
      #  BlueHost shell access is disabled for this account.
      #  Sidecar changes require manual rebuild:
      #    1. Enable shell in cPanel → SSH Access → Manage Shell Access
      #    2. Run: bash scripts/rf-deploy.sh  (or npm ci && npm run build)
      #  To re-enable automated sidecar deploys, add SSH shell access and
      #  restore the SSH steps from git history.
